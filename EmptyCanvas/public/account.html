<!-- Account page: match "Settled my account" mini-window styling + smaller edit button -->
<style>
  /* Smaller edit icon button (transparent background) */
  .acc-action.acc-edit{
    width: 26px !important;
    height: 26px !important;
    padding: 0 !important;
    border: none !important;
    background: transparent !important;
    border-radius: 10px !important;
  }
  .acc-action.acc-edit:hover{
    background: transparent !important;
    opacity: 0.85;
  }
  .acc-action.acc-edit svg{ width: 15px; height: 15px; }

  /* ============================
     Modal styling (same as Expenses "Settled my account")
     ============================ */
  .ex-modal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .ex-modal-box{
    background: white;
    padding: 1.8rem;
    width: 90%;
    max-width: 420px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .ex-modal-title{
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }
  .ex-input{
    width: 100%;
    padding: 0.8rem;
    border-radius: 12px;
    border: 1.5px solid #d1d5db;
    margin-bottom: 1rem;
    font-size: 1rem;
    background: #fff;
  }
  .ex-modal-actions{
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
  }
  .ex-btn{
    padding: 0.7rem 1.4rem;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
  .ex-primary{ background: #3b82f6; color: white; }
  .ex-danger{ background: #ef4444; color: white; }

  /* Inline error message inside modal */
  .ex-error{
    display: none;
    margin-top: -0.5rem;
    margin-bottom: 0.8rem;
    color: #B91C1C;
    font-weight: 700;
    font-size: 0.95rem;
  }


  /* Label row with icon (like expenses modals) */
  .field-label{
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 700;
    color: #111;
    margin-top: 0.6rem;
    margin-bottom: 0.25rem;
  }
  .field-label svg{ width: 16px; height: 16px; }

  /* ============================
     Show/Hide password (match Login page)
     ============================ */
  /*
    NOTE:
    - On this page the input has margin-bottom, which makes absolute centering look off.
      So we move the spacing to the wrapper, and remove margin from the input inside.
    - Also hide browser built-in password/credential buttons so our eye icon is always visible.
  */
  .password-wrapper{
    position: relative;
    margin-bottom: 1rem;
  }
  .password-wrapper .ex-input{
    margin-bottom: 0;
  }

  /* Add right padding only when toggle exists */
  .password-wrapper.has-toggle .ex-input{ padding-right: 2.5rem; }

  /* Hide toggle when wrapper doesn't opt-in */
  .password-wrapper:not(.has-toggle) .toggle-password{ display:none; }

  /* Hide built-in reveal/autofill buttons (Edge/IE + Chromium) */
  input[type="password"]::-ms-reveal,
  input[type="password"]::-ms-clear{ display:none; }
  input::-webkit-credentials-auto-fill-button,
  input::-webkit-contacts-auto-fill-button{
    visibility: hidden;
    display: none !important;
    pointer-events: none;
  }

  .toggle-password{
    position: absolute;
    top: 50%;
    right: .6rem;
    transform: translateY(-50%);
    width: 2rem;
    height: 2rem;
    padding: 0;
    border: 0;
    background: transparent;
    color: #6B7280;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    z-index: 3;
    -webkit-appearance: none;
    appearance: none;
    line-height: 0;
  }
  .toggle-password svg{ display:block; }
  .toggle-password:hover{ color: #374151; background: rgba(0,0,0,.04); }
  .toggle-password:active{ transform: translateY(-50%) scale(.98); }

</style>

    <script>
(() => {
  const GROUP_KEY = 'ui.sidebar.nrr.open';
  const group = document.querySelector('.nav-group[data-group="nrr"]');
  if (!group) return;

  const toggle = group.querySelector('.nav-group-toggle');
  const sub    = group.querySelector('.nav-sub');

  function setOpen(open) {
    group.classList.toggle('is-open', open);
    toggle.setAttribute('aria-expanded', String(open));
    // animate height
    if (sub) sub.style.maxHeight = open ? sub.scrollHeight + 'px' : '0px';
    try { localStorage.setItem(GROUP_KEY, open ? '1' : '0'); } catch {}
  }

  // open if saved OR if current page is the NRR page
  const saved = (() => { try { return localStorage.getItem(GROUP_KEY) === '1'; } catch { return false; }})();
  const onNRR = location.pathname.endsWith('/new-report-request.html');
  setOpen(saved || onNRR);

  toggle.addEventListener('click', (e) => {
    e.preventDefault();
    setOpen(!group.classList.contains('is-open'));
  });

  // highlight active sub item by ?view=
  const params = new URLSearchParams(location.search);
  const view = params.get('view') || 'request';
  group.querySelectorAll('.nav-sublink').forEach(a => {
    const isActive = a.getAttribute('href')?.endsWith('view=' + view);
    a.classList.toggle('active', !!isActive);
  });

  // keep feather icons updated
  if (window.feather) feather.replace();

  // keep height correct if fonts load / window resizes
  window.addEventListener('resize', () => {
    if (group.classList.contains('is-open')) {
      sub.style.maxHeight = sub.scrollHeight + 'px';
    }
  });
})();
</script>
